<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Talksy Web</title>
</head>

<body style="background:#0f172a; color:white; text-align:center; padding-top:100px;">

  <h1>Talksy Web 💬</h1>
  <p>Real conversations. No phone number needed.</p>

  <button onclick="login()" style="padding:12px 20px; font-size:16px; border:none; border-radius:10px; cursor:pointer;">
    Continue with Google
  </button>

  <br><br>

  <button onclick="logout()">Logout</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

    import {
      getAuth,
      GoogleAuthProvider,
      signInWithRedirect,
      getRedirectResult,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // 🔥 YOUR FIREBASE CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyCK3dYhgPl-CWJ9JuiI2rVuuv00Q7Do9f4",
      authDomain: "talksy-mini.firebaseapp.com",
      projectId: "talksy-mini",
      appId: "1:1044754891732:web:74d6c11362b52a056a8c41"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // ✅ LOGIN
    window.login = function () {
      signInWithRedirect(auth, provider);
    };

    // ✅ AFTER REDIRECT
    getRedirectResult(auth)
      .then((result) => {
        if (result && result.user) {
          alert("Welcome " + result.user.displayName);
        }
      })
      .catch((error) => {
        console.log(error);
      });

    // ✅ CHECK USER
    onAuthStateChanged(auth, (user) => {
      if (user) {
        console.log("Logged in:", user.displayName);
      } else {
        console.log("Not logged in");
      }
    });

    // ✅ LOGOUT
    window.logout = function () {
      signOut(auth);
    };
  </script>

</body>
</html>
